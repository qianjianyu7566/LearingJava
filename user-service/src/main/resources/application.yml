server:
  # Docker/部署建议使用固定端口，便于服务发现与压测定位
  port: ${USER_SERVICE_PORT:8081}

  # 面向高并发的基础线程/连接参数（可根据机器性能继续调大）
  tomcat:
    threads:
      max: 200
      min-spare: 20
    accept-count: 1000
    connection-timeout: 20000ms

spring:
  application:
    name: user-service
  profiles:
    # 指定要读取的配置 profile；会映射到 config-repo 里的 user-service-{profile}.yml
    active: dev
  config:
    # 可选导入：如果 config-server 正常启动，则优先从 Config Server 拉取配置
    import: "optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}"

user:
  # 本地默认值（当 Config Server 未提供对应配置时会生效）
  welcome-message: "Hello from user-service (local)."

eureka:
  client:
    service-url:
      # Eureka 注册中心地址
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
    # 是否注册到 Eureka
    register-with-eureka: true
    # 是否拉取注册表（用于自身发现其他服务；本骨架也会用到）
    fetch-registry: true
  instance:
    # 使用 IP 注册更直观
    prefer-ip-address: true
    # instance-id 避免多次启动时产生重复实例
    instance-id: ${spring.application.name}:${random.value}

management:
  endpoints:
    web:
      exposure:
        # 暴露所有 actuator 端点，方便开发期排查问题
        include: "*"


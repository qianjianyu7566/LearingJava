server:
  # Docker/部署时允许通过环境变量覆盖端口，避免端口冲突
  port: ${CONFIG_SERVER_PORT:8888}

spring:
  application:
    # Config Server 服务名称（也可以用于发现/配置总线）
    name: config-server
  profiles:
    # 启用 native 模式：直接从本地文件系统读取配置
    active: native
  cloud:
    config:
      server:
        native:
          # 配置仓库路径：Spring Cloud Config Server 会读取该目录下的 yml/properties
          # 例如：user-service-dev.yml 会被 user-service（profile=dev）读取。
          # 在 Docker 场景下，默认把配置仓库放到容器内的 /app/config-repo
          search-locations: "file:${CONFIG_REPO_PATH:/app/config-repo}"

management:
  endpoints:
    web:
      exposure:
        # 暴露所有 actuator 端点，便于查看健康/配置信息
        include: "*"

